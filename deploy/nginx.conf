# Front Angular (SPA) servi statiquement + reverse-proxy interne vers les APIs.
# Reproduit le routage du proxy de dev (FamilyTools.Web/proxy.conf.js) :
#   /api      -> EasyComptaAPI   (prefixe retire)
#   /hubs     -> EasyComptaAPI   (SignalR, WebSocket)
#   /identity -> Accounts        (prefixe retire)
# Le reste -> index.html (routing cote client Angular).
server {
    listen 4200;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression basique des assets statiques.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API REST EasyCompta — le slash final sur proxy_pass retire le prefixe /api.
    location /api/ {
        proxy_pass http://easycomptaapi:8080/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hub SignalR (notifications de fin d'import) — upgrade WebSocket, pas de reecriture.
    location /hubs/ {
        proxy_pass http://easycomptaapi:8080/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # API transversale "Mon compte" (Accounts) — le slash final retire le prefixe /identity.
    location /identity/ {
        proxy_pass http://accounts:8080/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA : toute autre route renvoie index.html (Angular gere le routing client).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
