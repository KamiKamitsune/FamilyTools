<div class="header">
  <h1>Tableau de bord des tags</h1>
</div>

<div class="navigation-tabs">
  <div class="tab" routerLink="/easycompta/account-page">Tableau de données</div>
  <div class="tab active">Tag</div>
  <div class="tab" routerLink="/easycompta/account-chart-month">Diagrammes mois</div>
  <div class="tab" routerLink="/easycompta/account-chart-year">Diagrammes année</div>
  <div class="tab" routerLink="/user">Membres</div>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Nom</th>
        <th>Couleur</th>
        <th class="action-column">Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (tag of service.allTag(); track tag.id) {
        <tr>
          <td>{{ tag.name }}</td>
          <td>
            <span class="tag-swatch" [style.background-color]="tag.color"></span>
            {{ tag.color }}
          </td>
          <td>
            <div class="row-actions">
              <button type="button" (click)="editTag(tag)">
                <span class="action-icon">✏️</span>
              </button>
              <button type="button" (click)="deleteTag(tag.id!)">
                <span class="action-icon">🗑️</span>
              </button>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>

<div class="card">
  <div class="card-header">
    <h2 class="card-title">
      @if (editingTag()) {
        Modifier le tag
      } @else {
        Ajouter un nouveau tag
      }
    </h2>
  </div>
  <app-tag-form [tagToEdit]="editingTag()" (saved)="onSaved()" />
</div>
