<form (submit)="onSubmit($event)" class="tag-form">
  <div class="form-group">
    <label class="form-label required-label">Nom</label>
    <input [formField]="tagForm.name" class="form-control" type="text" placeholder="Nom du tag" />

    @if (tagForm.name().touched() && tagForm.name().invalid()) {
      <div class="alert alert-danger">
        @for (error of tagForm.name().errors(); track error) {
          <span>{{ error.message }}</span>
        }
      </div>
    }
  </div>

  <div class="form-group">
    <label class="form-label required-label">Couleur</label>
    <div class="color-row">
      <input [formField]="tagForm.color" type="color" class="color-input" />
      <input [formField]="tagForm.color" class="form-control" type="text" placeholder="#2196F3" />
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" type="submit">
      @if (isEdit()) {
        Modifier le tag
      } @else {
        Ajouter le tag
      }
    </button>
    @if (isEdit()) {
      <button class="btn btn-secondary" type="button" (click)="cancel()">Annuler</button>
    }
  </div>
</form>
