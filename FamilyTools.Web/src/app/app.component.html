<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Portail d'Applications</title>
</head>
<body>
<div class="container">
    <header>
        @if (isAuthenticated()) {
            <div class="auth-bar">
                <span class="auth-user">{{ userName() }}</span>
                <a class="auth-account" routerLink="/account">Mon compte</a>
                <button class="auth-logout" type="button" (click)="logout()">Déconnexion</button>
            </div>
        }
        <h1>Portail d'Applications</h1>
        <p class="subtitle">Sélectionnez une application pour l'ouvrir</p>
    </header>

    <div class="app-grid">
        <!-- Application 1 -->
        <div class="app-item">
            <button class="app-button" routerLink="/easycompta">
                <img alt="easycompta" src="/api/placeholder/60/60">
            </button>
            <p class="app-name">Easy Compta</p>
        </div>

        <!-- Application 2 -->
        <div class="app-item">
            <button class="app-button" routerLink="/user">
                <img alt="user" src="/api/placeholder/60/60">
            </button>
            <p class="app-name">User gestion</p>
        </div>
    </div>
</div>
</body>
</html>

<app-notification />

<p>
  <router-outlet/>
</p>
