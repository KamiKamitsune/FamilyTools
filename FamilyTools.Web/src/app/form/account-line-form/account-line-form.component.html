    <div class="form-container">

        <div class="form-section">

            <div class="form-group">
                <label class="form-label required-label">utilisateur
                </label>
                <select class="form-control" [field]="lineForm.user.userName">
                    @for (user of userService.Users(); track user.id) {
                        <option value="user.id">{{ user.userName }}</option>
                    }
                </select>              
            </div>

            <div class="form-group">
                <label class="form-label required-label">Valeur
                </label>
                <input class="form-control" type="number" [field]="lineForm.value">

                @if (lineForm.value().touched() && lineForm.value().invalid()) {
                <div class="alert alert-danger">
                    <ul>
                        @for (error of lineForm.value().errors(); track error) {
                        <li>{{ error.message }}</li>
                        }
                    </ul>
                </div>
                }
            </div>
        </div>
    </div>
